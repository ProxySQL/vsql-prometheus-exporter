name: test
on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: villagesql-server

    steps:
      - name: Checkout VillageSQL server (tomas/dev)
        uses: actions/checkout@v4
        with:
          repository: villagesql/villagesql-server
          ref: tomas/dev
          path: villagesql-server

      - name: Checkout extension
        uses: actions/checkout@v4
        with:
          path: extension

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake gcc make libtirpc-dev libcurl4-openssl-dev netcat-openbsd

      - name: Configure VillageSQL
        run: |
          mkdir build && cd build
          cmake .. \
            -DWITH_DEBUG=1 \
            -DWITH_UNIT_TESTS=OFF \
            -DWITH_ROUTER=OFF

      - name: Build VillageSQL
        run: |
          cd build
          make -j$(nproc)

      - name: Build extension
        working-directory: extension
        run: |
          mkdir build && cd build
          cmake .. -DVillageSQL_BUILD_DIR=$GITHUB_WORKSPACE/villagesql-server/build
          make -j$(nproc)

      - name: Run MTR tests
        run: |
          VEB_DIR=$GITHUB_WORKSPACE/veb
          mkdir -p $VEB_DIR
          cp $GITHUB_WORKSPACE/extension/build/prometheus_exporter.veb $VEB_DIR/

          # Copy test files into the server's test suite
          cp -r $GITHUB_WORKSPACE/extension/mysql-test/t $GITHUB_WORKSPACE/villagesql-server/mysql-test/suite/villagesql/prometheus_exporter/t
          cp -r $GITHUB_WORKSPACE/extension/mysql-test/r $GITHUB_WORKSPACE/villagesql-server/mysql-test/suite/villagesql/prometheus_exporter/r

          cd build
          perl ./mysql-test/mysql-test-run.pl \
            --do-suite=villagesql/prometheus_exporter \
            --parallel=1 \
            --nounit-tests \
            --mysqld=--veb-dir=$VEB_DIR

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            villagesql-server/build/mysql-test/var/log/*.log
